name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:00 UTC — catches new CVEs published over the weekend
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  build:
    name: build + verify modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # Always grab the latest patch matching the spec — guards
          # against Dependabot rewriting "go 1.25" to "go 1.25.0",
          # which otherwise pins us to the unpatched .0 release.
          check-latest: true
          cache: true
      - run: go mod verify
      - run: go build ./...
      - run: go vet ./...

  govulncheck:
    name: govulncheck (Go CVEs in deps + stdlib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # Always grab the latest patch matching the spec — guards
          # against Dependabot rewriting "go 1.25" to "go 1.25.0",
          # which otherwise pins us to the unpatched .0 release.
          check-latest: true
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: gosec (static security analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # Always grab the latest patch matching the spec — guards
          # against Dependabot rewriting "go 1.25" to "go 1.25.0",
          # which otherwise pins us to the unpatched .0 release.
          check-latest: true
          cache: true
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        run: gosec -fmt text -severity medium ./...

  gitleaks:
    name: gitleaks (secrets in git history)
    runs-on: ubuntu-latest
    # Dependabot PRs only modify dependency versions — they cannot
    # introduce committed secrets, and gitleaks-action@v2 fails on them
    # because Dependabot's GITHUB_TOKEN is read-only and the action
    # tries to write PR comments.
    if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
